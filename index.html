<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fuller Street Executive Report</title>
  <style>
    :root{
      --bg:#f6f4ef;
      --panel:#ffffff;
      --line:#ddd7cc;
      --text:#171717;
      --muted:#6b7280;
      --gold-1:#f3ead0;
      --gold-2:#ecdfb6;
      --gold-line:#d8c694;
      --brand:#f15a24;
      --panel-heading:#2563eb;
      --shadow:0 8px 24px rgba(0,0,0,.05);
      --radius:20px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:1440px;margin:0 auto;padding:28px}
    .hero{margin-bottom:18px}
    .brand{margin:0 0 8px;font-size:44px;line-height:1;font-weight:900;letter-spacing:-0.03em;color:var(--brand)}
    .subtitle{margin:0;font-size:18px;font-weight:600;color:var(--muted)}
    .tabs{display:flex;gap:14px;margin:20px 0 18px}
    .tab{border:1px solid var(--line);background:#fff;color:var(--muted);border-radius:16px;padding:14px 22px;font-size:18px;font-weight:700;cursor:pointer}
    .tab.active{background:#111;color:#fff;border-color:#111}
    .screen{display:none}.screen.active{display:block}
    .goal-band{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
    .goal-card{background:linear-gradient(180deg,var(--gold-1),var(--gold-2));border:1px solid var(--gold-line);border-radius:18px;padding:16px 18px;box-shadow:var(--shadow);min-height:86px}
    .goal-label{text-transform:uppercase;letter-spacing:.1em;font-size:12px;font-weight:900;color:#8a6a17;margin-bottom:8px}
    .goal-value{font-size:16px;font-weight:800;color:#4b3b10;line-height:1.3}
    .section-title{font-size:14px;letter-spacing:.12em;text-transform:uppercase;color:#777065;font-weight:800;margin:8px 2px 12px}
    .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:20px}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
    .kpi{padding:22px;min-height:164px;display:flex;flex-direction:column;justify-content:space-between}
    .kpi-label{font-size:18px;color:#3f3f46}
    .kpi-value{font-size:48px;line-height:1;font-weight:900;margin:12px 0}
    .kpi-sub{font-size:15px;font-weight:800}
    .kpi-note{margin-top:6px;color:var(--muted);font-size:14px}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
    .panel-head{padding:18px 20px 6px;font-size:18px;font-weight:900;color:var(--panel-heading)}
    .list{padding:0 14px 14px}
    .row{display:grid;gap:14px;align-items:start;padding:16px 10px;border-top:1px solid #ece6dc}
    .row:first-child{border-top:none}
    .insight-row{grid-template-columns:110px 1fr}
    .decision-row{grid-template-columns:1fr auto}
    .chip{display:inline-flex;align-items:center;justify-content:center;min-width:90px;padding:7px 12px;border-radius:999px;background:#fbf1df;color:#9a6700;font-size:13px;font-weight:900}
    .stack{padding:0 16px 16px;display:grid;gap:12px}
    .stack-item{border:1px solid #ece6dc;border-radius:16px;padding:14px 16px;min-height:92px}
    .stack-title{font-size:15px;font-weight:900;margin-bottom:6px}
    .stack-sub{font-size:14px;color:var(--muted);line-height:1.35}
    table.data-table{width:100%;border-collapse:collapse}
    table.data-table th, table.data-table td{padding:12px 10px;border-top:1px solid #ece6dc;text-align:left;font-size:14px}
    table.data-table th{color:var(--muted);font-weight:800}
    .wide{margin-bottom:20px}
    @media (max-width:1100px){.goal-band,.kpi-grid,.grid-2{grid-template-columns:1fr 1fr}}
    @media (max-width:780px){.goal-band,.kpi-grid,.grid-2{grid-template-columns:1fr}.insight-row,.decision-row{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1 class="brand">Fuller Street</h1>
      <p class="subtitle">Monthly Executive Performance Summary — May 2026</p>
    </div>
    <div class="tabs">
      <button class="tab active" data-target="week1">Week 1 — Executive Summary</button>
      <button class="tab" data-target="week2">Week 2 — Close the Loops</button>
    </div>
    <section class="screen active" id="week1"></section>
    <section class="screen" id="week2"></section>
  </div>

  <script>
    const SHEET_FEED_URL = "https://script.google.com/macros/s/AKfycbyrE1aozXuuUYnUJQBSyGSvLJo-_S3Ib5kk1xMSQRbTLKtBrdnOCAxm77o72vupzc5sQA/exec";

    function safe(v){ return (v ?? "").toString(); }

    function goalBand(items){
      return `<div class="goal-band">${items.map(item => `
        <div class="goal-card">
          <div class="goal-label">${safe(item.label)}</div>
          <div class="goal-value">${safe(item.value)}</div>
        </div>`).join("")}</div>`;
    }

    function kpiCards(items, title){
      return `<div class="section-title">${title}</div>
        <div class="kpi-grid">${items.map(item => `
          <div class="card kpi">
            <div class="kpi-label">${safe(item.label)}</div>
            <div class="kpi-value">${safe(item.value)}</div>
            <div>
              <div class="kpi-sub">${safe(item.sub)}</div>
              <div class="kpi-note">${safe(item.note)}</div>
            </div>
          </div>`).join("")}
        </div>`;
    }

    function insightsPanel(items){
      return `<div class="card">
        <div class="panel-head">What This Means</div>
        <div class="list">${items.map(item => `
          <div class="row insight-row">
            <div><span class="chip">${safe(item.label)}</span></div>
            <div>
              <div class="stack-title">${safe(item.title)}</div>
              <div class="stack-sub">${safe(item.text)}</div>
            </div>
          </div>`).join("")}
        </div>
      </div>`;
    }

    function decisionsPanel(items, title){
      return `<div class="card">
        <div class="panel-head">${title}</div>
        <div class="list">${items.map(item => `
          <div class="row decision-row">
            <div class="stack-title">${safe(item.text)}</div>
            <div class="stack-sub">${safe(item.meta)}</div>
          </div>`).join("")}
        </div>
      </div>`;
    }

    function stackPanel(title, items){
      return `<div class="card">
        <div class="panel-head">${title}</div>
        <div class="stack">${items.map(item => `
          <div class="stack-item">
            <div class="stack-title">${safe(item.title)}</div>
            <div class="stack-sub">${safe(item.sub)}</div>
          </div>`).join("")}
        </div>
      </div>`;
    }

    function tablePanel(title, items, columns){
      return `<div class="card">
        <div class="panel-head">${title}</div>
        <div class="list">
          <table class="data-table">
            <thead>
              <tr>${columns.map(col => `<th>${col.label}</th>`).join("")}</tr>
            </thead>
            <tbody>
              ${items.map(item => `<tr>${columns.map(col => `<td>${safe(item[col.key])}</td>`).join("")}</tr>`).join("")}
            </tbody>
          </table>
        </div>
      </div>`;
    }

    function render(data){
      const w1 = data.week1 || {};
      const w2 = data.week2 || {};

      document.getElementById("week1").innerHTML = `
        ${goalBand(w1.goals || [])}
        ${kpiCards(w1.kpis || [], "Performance Snapshot")}
        <div class="grid-2">
          ${insightsPanel(w1.insights || [])}
          ${decisionsPanel(w1.decisions || [], "Decisions Needed")}
        </div>
        <div class="grid-2">
          ${stackPanel("Focus This Month", w1.focus || [])}
          ${stackPanel("Recommended Next Moves", w1.nextMoves || [])}
        </div>
        <div class="grid-2">
          ${tablePanel("Top Search Terms", w1.topSearchTerms || [], [
            {key:"term", label:"Search Term"},
            {key:"clicks", label:"Clicks"},
            {key:"impressions", label:"Impressions"}
          ])}
          ${tablePanel("Top Pages Viewed", w1.topPagesViewed || [], [
            {key:"page", label:"Page"},
            {key:"impressions", label:"Impressions"},
            {key:"clicks", label:"Clicks"}
          ])}
        </div>
      `;

      document.getElementById("week2").innerHTML = `
        ${goalBand(w2.goals || [])}
        ${kpiCards(w2.kpis || [], "Closure Snapshot")}
        <div class="grid-2">
          ${decisionsPanel(w2.followups || [], "Follow Ups")}
          ${stackPanel("Completion Status", w2.completionStatus || [])}
        </div>
        <div class="wide">
          ${stackPanel("Next Actions", w2.nextMoves || [])}
        </div>
      `;
    }

    async function loadDashboardData(){
      try{
        const res = await fetch(SHEET_FEED_URL + "?t=" + Date.now(), { cache: "no-store" });
        const data = await res.json();
        render(data);
      } catch (err) {
        console.error("Failed to load dashboard data", err);
      }
    }

    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
        tab.classList.add("active");
        document.getElementById(tab.dataset.target).classList.add("active");
      });
    });

    loadDashboardData();
  </script>
</body>
</html>
