<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Executive Dashboard Live</title>
<style>
  :root{
    /* Change this hex to update the client/brand color */
    --bg:#f6f4ef; --panel:#fff; --line:#ddd7cc; --text:#171717; --muted:#6b7280;
    --gold1:#f3ead0; --gold2:#ecdfb6; --goldBorder:#d8c694; --shadow:0 8px 24px rgba(0,0,0,.05);
    --radius:18px;
    --brand:#f15a24;
  }
  *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
  .wrap{max-width:1380px;margin:0 auto;padding:28px}
  .hero{margin-bottom:18px}
  .brand{font-size:42px;line-height:1;font-weight:900;letter-spacing:-0.03em;margin:0 0 8px;color:var(--brand)}
  .subtitle{font-size:18px;color:#6b7280;font-weight:600;margin:0}
  .topbar{display:flex;gap:14px;margin-bottom:16px}
  .tab{border:1px solid var(--line);background:#fff;color:#6b7280;border-radius:16px;padding:14px 22px;font-size:18px;font-weight:700;cursor:pointer}
  .tab.active{background:#151515;color:#fff;border-color:#151515}
  .screen{display:none}.screen.active{display:block}
  .goal-band{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
  .goal-card{background:linear-gradient(180deg,var(--gold1) 0%, var(--gold2) 100%);border:1px solid var(--goldBorder);border-radius:16px;padding:14px 16px;box-shadow:var(--shadow)}
  .goal-label{text-transform:uppercase;font-size:12px;letter-spacing:.1em;color:#8a6a17;font-weight:900;margin-bottom:6px}
  .goal-value{font-size:16px;font-weight:800;color:#4b3b10}
  .section-title{font-size:14px;letter-spacing:.12em;text-transform:uppercase;color:#777065;margin:10px 2px 10px;font-weight:800}
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:20px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
  .kpi{padding:22px;min-height:154px;display:flex;flex-direction:column;justify-content:space-between}
  .kpi .label{font-size:18px;color:#3f3f46}
  .kpi .value{font-size:48px;line-height:1;font-weight:800;margin:10px 0}
  .kpi .sub{font-size:15px;font-weight:800}
  .kpi .note{margin-top:6px;color:var(--muted);font-size:14px}
  .two-col{display:grid;grid-template-columns:1.2fr .95fr;gap:20px;margin-bottom:20px}
  .equal{grid-template-columns:1fr 1fr}
  .panel-head{padding:18px 20px 8px;font-size:18px;font-weight:800}
  .list{padding:0 14px 14px}
  .row{display:grid;align-items:center;gap:14px;padding:16px 10px;border-top:1px solid #ece6dc}
  .row:first-child{border-top:none}
  .insight-row{grid-template-columns:120px 1fr}
  .decision-row{grid-template-columns:1fr auto}
  .stack{padding:0 16px 16px;display:grid;gap:12px}
  .stack-item{border:1px solid #ece6dc;border-radius:14px;padding:14px 16px}
  .stack-title{font-size:15px;font-weight:800;margin-bottom:4px}
  .stack-sub{font-size:14px;color:var(--muted)}
  .chip{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:7px 12px;font-size:13px;font-weight:900;min-width:86px;background:#fbf1df;color:#9a6700}
    @media (max-width:1100px){.goal-band,.kpi-grid,.two-col{grid-template-columns:1fr 1fr}}
  @media (max-width:800px){.goal-band,.kpi-grid,.two-col{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <h1 class="brand">Fuller Street</h1>
    <p class="subtitle">Marketing Performance Summary — May 2026</p>
  </div>
  <div class="topbar">
    <button class="tab active" data-target="week1">Week 1 — Executive Summary</button>
    <button class="tab" data-target="week2">Week 2 — Close the Loops</button>
  </div>
  <section class="screen active" id="week1"></section>
  <section class="screen" id="week2"></section>
  

  <div class="card" style="margin-top:20px;padding:18px 20px;">
    <div class="panel-head" style="padding:0 0 10px;">Final Notes</div>
    <div class="stack-sub">Use this area for final approvals, reminders, or meeting wrap-up notes.</div>
  </div>

</div>

<script>
const SHEET_FEED_URL = "https://script.google.com/macros/s/AKfycbyrE1aozXuuUYnUJQBSyGSvLJo-_S3Ib5kk1xMSQRbTLKtBrdnOCAxm77o72vupzc5sQA/exec";

const fallbackData = {
  week1: {goals:[],kpis:[],insights:[],decisions:[],focus:[],nextMoves:[]},
  week2: {goals:[],kpis:[],followups:[],focus:[],nextMoves:[]}
};

function goalBand(items){
  return `<div class="goal-band">${items.map(g => `
    <div class="goal-card">
      <div class="goal-label">${g.label || ""}</div>
      <div class="goal-value">${g.value || ""}</div>
    </div>`).join("")}</div>`;
}
function kpiCards(items, title){
  return `<div class="section-title">${title}</div>
  <div class="kpi-grid">${items.map(k => `
    <div class="card kpi">
      <div class="label">${k.label || ""}</div>
      <div class="value">${k.value || ""}</div>
      <div>
        <div class="sub">${k.sub || ""}</div>
        <div class="note">${k.note || ""}</div>
      </div>
    </div>`).join("")}</div>`;
}
function insightsPanel(items){
  return `<div class="card"><div class="panel-head">What This Means</div><div class="list">
    ${items.map(i => `
      <div class="row insight-row">
        <span class="chip">${i.label || ""}</span>
        <div>
          <div class="stack-title">${i.title || ""}</div>
          <div class="stack-sub">${i.text || ""}</div>
        </div>
      </div>`).join("")}
  </div></div>`;
}
function decisionPanel(items, title){
  return `<div class="card"><div class="panel-head">${title}</div><div class="list">
    ${items.map(i => `
      <div class="row decision-row">
        <div class="stack-title">${i.text || ""}</div>
        <div class="stack-sub">${i.meta || ""}</div>
      </div>`).join("")}
  </div></div>`;
}
function stackedPanel(title, items){
  return `<div class="card"><div class="panel-head">${title}</div><div class="stack">
    ${items.map(i => `
      <div class="stack-item">
        <div class="stack-title">${i.title || ""}</div>
        <div class="stack-sub">${i.sub || ""}</div>
      </div>`).join("")}
  </div></div>`;
}
function render(data){
  const w1 = data.week1 || fallbackData.week1;
  const w2 = data.week2 || fallbackData.week2;

  document.getElementById("week1").innerHTML =
    goalBand(w1.goals || []) +
    kpiCards(w1.kpis || [], "Performance Snapshot") +
    `<div class="two-col">${insightsPanel(w1.insights || [])}${decisionPanel(w1.decisions || [], "Decisions Needed")}</div>` +
    `<div class="two-col equal">${stackedPanel("Focus This Month", w1.focus || [])}${stackedPanel("Recommended Next Moves", w1.nextMoves || [])}</div>`;

  document.getElementById("week2").innerHTML =
    goalBand(w2.goals || []) +
    kpiCards(w2.kpis || [], "Closure Snapshot") +
    `<div class="two-col">${decisionPanel(w2.followups || [], "Answers & Follow-Ups")}${stackedPanel("Close-the-Loop Read", w2.focus || [])}</div>` +
    `<div class="two-col equal">${stackedPanel("Next Actions", w2.nextMoves || [])}${stackedPanel("Meeting Outcome", [])}</div>`;
}
async function loadDashboardData(){
  try {
    const res = await fetch(SHEET_FEED_URL + "?t=" + Date.now(), {cache:"no-store"});
    const data = await res.json();
    render(data);
  } catch (e) {
    console.error(e);
    render(fallbackData);
  }
}
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById(tab.dataset.target).classList.add("active");
  });
});
loadDashboardData();
</script>
</body>
</html>
